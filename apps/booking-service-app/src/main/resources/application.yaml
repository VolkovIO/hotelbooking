spring:
  application:
    name: booking-service
  output:
    ansi:
      enabled: ALWAYS
  profiles:
    group:
      local:
        - booking-postgres
        - inventory-grpc-client
        - security-dev
        - outbox-publisher
        - outbox-logging
      local-kafka:
        - booking-postgres
        - inventory-grpc-client
        - security-dev
        - outbox-publisher
        - outbox-kafka
      local-jwt:
        - booking-postgres
        - inventory-grpc-client
        - security-jwt
        - outbox-publisher
        - outbox-logging
      local-jwt-kafka:
        - booking-postgres
        - inventory-grpc-client
        - security-jwt
        - outbox-publisher
        - outbox-kafka

  datasource:
    url: jdbc:postgresql://localhost:5432/hotelbooking
    username: hotelbooking
    password: hotelbooking
    driver-class-name: org.postgresql.Driver
  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-master.yaml

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3


server:
  port: 8080

inventory:
  grpc:
    client:
      host: localhost
      port: 9090
      tls:
        enabled: ${INVENTORY_GRPC_CLIENT_TLS_ENABLED:true}
        certificate-chain: ${INVENTORY_GRPC_CLIENT_CERTIFICATE_CHAIN:certs/dev/booking-service.crt}
        private-key: ${INVENTORY_GRPC_CLIENT_PRIVATE_KEY:certs/dev/booking-service.key}
        trust-cert-collection: ${INVENTORY_GRPC_TRUST_CERT_COLLECTION:certs/dev/ca.crt}

app:
  booking:
    outbox:
      publisher:
        enabled: ${BOOKING_OUTBOX_PUBLISHER_ENABLED:true}
        fixed-delay-ms: ${BOOKING_OUTBOX_FIXED_DELAY_MS:30000}
        batch-size: ${BOOKING_OUTBOX_BATCH_SIZE:10}
        max-attempts: ${BOOKING_OUTBOX_MAX_ATTEMPTS:3}
        retry-delay: ${BOOKING_OUTBOX_RETRY_DELAY:PT30S}
      kafka:
        topic-name: ${BOOKING_EVENTS_TOPIC:booking.events}
        partitions: ${BOOKING_EVENTS_TOPIC_PARTITIONS:3}
        replicas: ${BOOKING_EVENTS_TOPIC_REPLICAS:1}
        send-timeout: ${BOOKING_OUTBOX_KAFKA_SEND_TIMEOUT:PT10S}