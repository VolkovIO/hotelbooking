spring:
  application:
    name: inventory-service
  output:
    ansi:
      enabled: ALWAYS
  profiles:
    group:
      local:
        - inventory-mongo
        - inventory-grpc-server
        - security-dev
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/hotelbooking}

server:
  port: 8081

inventory:
  grpc:
    server:
      port: 9090