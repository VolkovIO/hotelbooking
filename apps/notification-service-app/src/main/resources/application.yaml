spring:
  application:
    name: notification-service
  output:
    ansi:
      enabled: ALWAYS
  profiles:
    group:
      local:
        - notification-mongo
        - notification-kafka
        - notification-senders-logging

server:
  port: 8082

app:
  notification:
    kafka:
      booking-events-topic: ${BOOKING_EVENTS_TOPIC:booking.events}
      group-id: ${NOTIFICATION_KAFKA_GROUP_ID:notification-service}
    delivery:
      enabled: ${NOTIFICATION_DELIVERY_ENABLED:true}
      batch-size: ${NOTIFICATION_DELIVERY_BATCH_SIZE:20}
      fixed-delay-ms: ${NOTIFICATION_DELIVERY_FIXED_DELAY_MS:30000}
      max-attempts: ${NOTIFICATION_DELIVERY_MAX_ATTEMPTS:3}
      retry-delay: ${NOTIFICATION_DELIVERY_RETRY_DELAY:30s}
      lock-duration: ${NOTIFICATION_DELIVERY_LOCK_DURATION:1m}