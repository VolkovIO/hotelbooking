spring:
  application:
    name: audit-service
  output:
    ansi:
      enabled: ALWAYS
  profiles:
    group:
      dev:
        - audit-mongo
        - audit-kafka

server:
  port: ${AUDIT_SERVICE_PORT:8084}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

logging:
  config: classpath:logback/hotelbooking-logback-spring.xml