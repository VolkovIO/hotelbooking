spring:
  config:
    activate:
      on-profile: payment-postgres

  datasource:
    url: ${PAYMENT_POSTGRES_JDBC_URL:jdbc:postgresql://localhost:5432/hotelbooking_payment}
    username: ${PAYMENT_POSTGRES_USERNAME:hotelbooking}
    password: ${PAYMENT_POSTGRES_PASSWORD:hotelbooking}
    driver-class-name: org.postgresql.Driver

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false