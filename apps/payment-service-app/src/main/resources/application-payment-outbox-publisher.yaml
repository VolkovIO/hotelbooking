spring:
  config:
    activate:
      on-profile: payment-outbox-publisher

app:
  payment:
    outbox:
      polling:
        enabled: true
        batch-size: ${PAYMENT_OUTBOX_POLLING_BATCH_SIZE:20}
        fixed-delay-ms: ${PAYMENT_OUTBOX_POLLING_FIXED_DELAY_MS:5000}
        max-attempts: ${PAYMENT_OUTBOX_POLLING_MAX_ATTEMPTS:3}
        retry-delay: ${PAYMENT_OUTBOX_POLLING_RETRY_DELAY:30s}